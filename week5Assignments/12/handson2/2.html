<!DOCTYPE html>
<html>
<head>
    <title>Student Grades</title>
    <link rel="stylesheet" href="2.css">
</head>
<body>

<table>
    <tr>
        <th colspan="2">Subject</th>
        <th>John Doe</th>
        <th>Miriam Luther</th>
    </tr>

    <!-- Biology -->
    <tr>
        <td rowspan="2">Biology</td>
        <td>Practical</td>
        <td>A</td>
        <td>A</td>
    </tr>
    <tr>
        <td>Theory</td>
        <td>A+</td>
        <td>A</td>
    </tr>

    <!-- Chemistry -->
    <tr>
        <td rowspan="2">Chemistry</td>
        <td>Practical</td>
        <td>B</td>
        <td>C</td>
    </tr>
    <tr>
        <td>Theory</td>
        <td>A</td>
        <td>C+</td>
    </tr>

    <!-- Physics -->
    <tr>
        <td rowspan="2">Physics</td>
        <td>Practical</td>
        <td>A</td>
        <td>A</td>
    </tr>
    <tr>
        <td>Theory</td>
        <td>A-</td>
        <td>A-</td>
    </tr>

</table>

</body>
</html>
