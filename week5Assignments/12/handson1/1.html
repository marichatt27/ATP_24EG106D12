<!DOCTYPE html>
<html>
<head>
    <title>Table Layout</title>
    <link rel="stylesheet" href="1.css">
</head>
<body>

<table>
    <!-- Title -->
    <tr>
        <th colspan="4" class="title">TITLE</th>
    </tr>

    <!-- Subtitles -->
    <tr>
        <th colspan="2">subtitle</th>
        <th colspan="2">subtitle</th>
    </tr>

    <!-- Content rows -->
    <tr>
        <td>1 item</td>
        <td>123</td>
        <td>1 item</td>
        <td>123</td>
    </tr>
    <tr>
        <td>1 item</td>
        <td>123</td>
        <td>1 item</td>
        <td>123</td>
    </tr>
    <tr>
        <td>1 item</td>
        <td>123</td>
        <td>1 item</td>
        <td>123</td>
    </tr>

    <!-- Bottom subtitles -->
    <tr>
        <td colspan="2">sub subtitle</td>
        <td colspan="2">sub subtitle</td>
    </tr>
</table>

</body>
</html>
